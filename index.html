  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  header {

    border-radius: 16px; color: white; box-shadow: 0 8px 32px rgba(102,126,234,0.3);

  header h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; letter-spacing: -0.5px; }
  header p { font-size: 15px; opacity: 0.9; }
  .card {
    background: white; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    margin-bottom: 24px; overflow: hidden;
  }
  .card-header {
    padding: 16px 20px; display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid #e8e8ec; flex-wrap: wrap; gap: 10px;
  }
  .card-header h2 {
    font-size: 18px; font-weight: 600; display: flex; align-items: center; gap: 8px;
  }
  .emoji-badge {
    display: inline-flex; align-items: center; justify-content: center;
    width: 36px; height: 36px; border-radius: 50%; font-size: 18px;
  }
  .audio-wrapper { flex: 0 1 auto; }
  .audio-wrapper audio { height: 40px; border-radius: 8px; }
  .chart-wrap { position: relative; width: 100%; }
  .chart-wrap canvas {
    width: 100%; display: block; cursor: crosshair;
  }
  .summary-row {
    display: flex; gap: 16px; padding: 12px 20px; background: #f8f9ff;
    border-bottom: 1px solid #e8e8ec; flex-wrap: wrap; align-items: center;
  }
  .stat {
    display: flex; align-items: center; gap: 6px; font-size: 13px; color: #555;
  }
  .stat .value { font-weight: 600; color: #1a1a2e; min-width: 30px; }
  .card-body { padding: 0; overflow-x: auto; }
  table {
    width: 100%; border-collapse: collapse; font-size: 13px;
  }
  thead { background: #f8f9ff; }
  th {
    padding: 10px 14px; text-align: left; font-weight: 600; font-size: 11px;
    text-transform: uppercase; letter-spacing: 0.5px; color: #666;
    border-bottom: 2px solid #e8e8ec; white-space: nowrap;
  }
  td {
    padding: 10px 14px; border-bottom: 1px solid #f0f0f5; white-space: nowrap;
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #f8f9ff; }
  .syllable-cell { font-weight: 600; color: #333; }
  .num { font-variant-numeric: tabular-nums; }
  @media (max-width: 768px) {
    body { padding: 12px; }
    header { padding: 24px 12px; }
    header h1 { font-size: 22px; }
    .card-header { padding: 12px; flex-direction: column; align-items: flex-start; }
    .audio-wrapper { width: 100%; }
    .audio-wrapper audio { width: 100%; }
    th, td { padding: 6px 8px; font-size: 11px; }
  }
</style>

const FILE_NAMES = ["happy.wav", "sad.wav", "neutral.wav", "surprise.wav", "angry.wav"];
const EMOTION_ICONS = { "happy.wav": "😊", "sad.wav": "😢", "neutral.wav": "😐", "surprise.wav": "😮", "angry.wav": "😠" };
const COLORS = ["#e8f4f8", "#fff3e0", "#e8f5e9", "#fce4ec", "#f3e5f5", "#e0f2f1"];

let animFrameId = null;

function fmt(v, d) { return v.toFixed(d); }

function renderChart(canvas, data, currentTime) {
  const rect = canvas.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  const W = rect.width, H = rect.height;

  const pad = { top: 28, bottom: 22, left: 52, right: 16 };
  const midH = (H - pad.top - pad.bottom) / 2;
  const plotW = W - pad.left - pad.right;
  const dur = data.duration;
  const tScale = plotW / Math.max(dur, 0.1);
  const intervals = data.syllable_intervals;

  function drawPanel(y0, panelH, drawFn) {
    const x0 = pad.left;
    ctx.fillStyle = '#fcfcfd';
    ctx.fillRect(x0, y0, plotW, panelH);
    for (let i = 0; i < intervals.length; i++) {
      const s = intervals[i].start, e = intervals[i].end;
      const ix = x0 + s * tScale;
      const iw = Math.max((e - s) * tScale, 1);
      ctx.fillStyle = COLORS[i % COLORS.length];
      ctx.fillRect(ix, y0, iw, panelH);
      ctx.fillStyle = '#555';
      ctx.font = '10px sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'top';
      ctx.fillText(intervals[i].syllable, ix + iw / 2, y0 + 2);
    }
    ctx.strokeStyle = '#eee';
    ctx.lineWidth = 0.5;
    for (let t = 0; t <= dur; t += 0.2) {
      const gx = x0 + t * tScale;
      ctx.beginPath(); ctx.moveTo(gx, y0); ctx.lineTo(gx, y0 + panelH); ctx.stroke();
    }
    drawFn(ctx, x0, y0, tScale, panelH);
    ctx.strokeStyle = '#999';
    ctx.lineWidth = 0.5;
    ctx.setLineDash([3, 3]);
    for (const inv of intervals) {
      const bx = x0 + inv.start * tScale;
      ctx.beginPath(); ctx.moveTo(bx, y0); ctx.lineTo(bx, y0 + panelH); ctx.stroke();
    }
    ctx.setLineDash([]);
    if (intervals.length) {
      const bx = x0 + intervals[intervals.length - 1].end * tScale;
      ctx.beginPath(); ctx.moveTo(bx, y0); ctx.lineTo(bx, y0 + panelH); ctx.stroke();
    }
    if (currentTime > 0) {
      const px = x0 + currentTime * tScale;
      ctx.strokeStyle = '#e53935';
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(px, y0); ctx.lineTo(px, y0 + panelH); ctx.stroke();
    }
  }

  // F0 panel
  drawPanel(pad.top, midH, (ctx, x0, y0, tScale, pH) => {
    const f0 = data.f0;
    const ft = data.f0_time;
    const bl = data.baseline_f0;
    if (!f0 || f0.length === 0) return;
    let fMin = 50, fMax = 400;
    const voiced = f0.filter(v => v !== null);
    if (voiced.length > 1) {
      fMin = Math.max(0, Math.min(...voiced) - 30);
      fMax = Math.max(...voiced) + 30;
    }
    const fRange = fMax - fMin || 1;
    function fY(hz) { return y0 + pH - ((hz - fMin) / fRange) * pH; }
    ctx.strokeStyle = '#e53935';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 4]);
    const blY = fY(bl);
    ctx.beginPath(); ctx.moveTo(x0, blY); ctx.lineTo(x0 + plotW, blY); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = '#e53935';
    ctx.font = '9px sans-serif';
    ctx.textAlign = 'left'; ctx.textBaseline = 'bottom';
    ctx.fillText('F\u2080 base ' + fmt(bl, 0) + ' Hz', x0 + 2, blY - 1);
    ctx.strokeStyle = '#2563eb';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    let started = false;
    for (let i = 0; i < f0.length; i++) {
      if (f0[i] === null) { started = false; continue; }
      const fx = x0 + ft[i] * tScale;
      const fy = fY(f0[i]);
      if (!started) { ctx.moveTo(fx, fy); started = true; }
      else { ctx.lineTo(fx, fy); }
    }
    ctx.stroke();
    ctx.fillStyle = '#666';
    ctx.font = '9px sans-serif';
    ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
    for (const yv of [fMin, (fMin + fMax) / 2, fMax]) {
      const yy = fY(yv);
      ctx.fillText(Math.round(yv).toString(), x0 - 4, yy);
      ctx.strokeStyle = '#eee';
      ctx.lineWidth = 0.5;
      ctx.beginPath(); ctx.moveTo(x0, yy); ctx.lineTo(x0 + plotW, yy); ctx.stroke();
    }
    ctx.save();
    ctx.translate(10, y0 + pH / 2);
    ctx.rotate(-Math.PI / 2);
    ctx.fillStyle = '#888';
    ctx.font = '10px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('F\u2080 (Hz)', 0, 0);
    ctx.restore();
    for (let i = 0; i < intervals.length; i++) {
      const inv = intervals[i];
      const sx = x0 + inv.start * tScale;
      const sw = Math.max((inv.end - inv.start) * tScale, 1);
      const syl = data.syllables[i];
      if (!syl) continue;
      ctx.fillStyle = '#e53935';
      ctx.font = 'bold 8px sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
      ctx.fillText('e=' + fmt(syl.emphasis, 2), sx + sw / 2, y0 + pH - 2);
    }
  });

  // dB panel
  drawPanel(pad.top + midH, midH, (ctx, x0, y0, tScale, pH) => {
    const db = data.db;
    const dt = data.db_time;
    if (!db || db.length === 0) return;
    let dBMin = Math.min(...db) - 3;
    let dBMax = Math.max(...db) + 3;
    const dBRange = dBMax - dBMin || 1;
    function dBY(v) { return y0 + pH - ((v - dBMin) / dBRange) * pH; }
    const meanDB = db.reduce((a, b) => a + b, 0) / db.length;
    ctx.strokeStyle = '#e53935';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 4]);
    const mY = dBY(meanDB);
    ctx.beginPath(); ctx.moveTo(x0, mY); ctx.lineTo(x0 + plotW, mY); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = '#e53935';
    ctx.font = '9px sans-serif';
    ctx.textAlign = 'left'; ctx.textBaseline = 'top';
    ctx.fillText('mean ' + fmt(meanDB, 1) + ' dB', x0 + 2, mY + 1);
    ctx.strokeStyle = '#16a34a';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    for (let i = 0; i < db.length; i++) {
      const fx = x0 + dt[i] * tScale;
      const fy = dBY(db[i]);
      if (i === 0) ctx.moveTo(fx, fy);
      else ctx.lineTo(fx, fy);
    }
    ctx.stroke();
    ctx.fillStyle = '#666';
    ctx.font = '9px sans-serif';
    ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
    for (const yv of [dBMin, (dBMin + dBMax) / 2, dBMax]) {
      const yy = dBY(yv);
      ctx.fillText(fmt(yv, 0), x0 - 4, yy);
      ctx.strokeStyle = '#eee';
      ctx.lineWidth = 0.5;
      ctx.beginPath(); ctx.moveTo(x0, yy); ctx.lineTo(x0 + plotW, yy); ctx.stroke();
    }
    ctx.save();
    ctx.translate(10, y0 + pH / 2);
    ctx.rotate(-Math.PI / 2);
    ctx.fillStyle = '#888';
    ctx.font = '10px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('RMS (dB)', 0, 0);
    ctx.restore();
    for (let i = 0; i < intervals.length; i++) {
      const inv = intervals[i];
      const sx = x0 + inv.start * tScale;
      const sw = Math.max((inv.end - inv.start) * tScale, 1);
      const syl = data.syllables[i];
      if (!syl) continue;
      ctx.fillStyle = '#16a34a';
      ctx.font = 'bold 8px sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'top';
      ctx.fillText('l=' + fmt(syl.loudness, 2), sx + sw / 2, y0 + 2);
    }
  });

  // time labels
  ctx.fillStyle = '#666';
  ctx.font = '9px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  for (let t = 0; t <= dur; t += 0.2) {
    const tx = pad.left + t * tScale;
    if (Math.abs(t - Math.round(t)) < 0.01 || Math.abs(t - Math.round(t * 2) / 2) < 0.01) {
      ctx.fillText(t.toFixed(1) + 's', tx, H - 18);
    }
  }
  if (currentTime > 0) {
    ctx.fillStyle = '#e53935';
    ctx.font = 'bold 10px sans-serif';
    ctx.textAlign = 'right'; ctx.textBaseline = 'bottom';
    ctx.fillText('\u23F1 ' + currentTime.toFixed(2) + 's', W - 8, H - 2);
  }
}

function setupCard(cardEl, data) {
  const audio = cardEl.querySelector('audio');
  const canvas = cardEl.querySelector('canvas');
  if (!audio || !canvas) return;
  let playing = false;
  function tick() {
    renderChart(canvas, data, audio.currentTime);
    if (playing) animFrameId = requestAnimationFrame(tick);
  }
  audio.addEventListener('play', () => {
    playing = true;
    if (animFrameId) { cancelAnimationFrame(animFrameId); animFrameId = null; }
    tick();
  });
  audio.addEventListener('pause', () => {
    playing = false;
    if (animFrameId) { cancelAnimationFrame(animFrameId); animFrameId = null; }
    renderChart(canvas, data, audio.currentTime);
  });
  audio.addEventListener('seeked', () => {
    renderChart(canvas, data, audio.currentTime);
    if (!audio.paused) { playing = true; if (animFrameId) cancelAnimationFrame(animFrameId); tick(); }
  });
  canvas.addEventListener('click', (e) => {
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left - 52;
    const seekTime = Math.max(0, (x / (rect.width - 52 - 16)) * data.duration);
    audio.currentTime = seekTime;
  });
  renderChart(canvas, data, 0);
}

// global normalization and build
(function() {
  const allRawDb = [];
  for (const fname of FILE_NAMES) {
    for (const s of ALL_DATA[fname].syllables) allRawDb.push(s.raw_db);
  }
  const lo = Math.min(...allRawDb);
  const hi = Math.max(...allRawDb);
  const rng = hi - lo;
  for (const fname of FILE_NAMES) {
    for (const s of ALL_DATA[fname].syllables) {
      s.loudness = rng > 0 ? +((s.raw_db - lo) / rng).toFixed(4) : 0;
    }
  }

  const container = document.getElementById('files');
  for (const fname of FILE_NAMES) {
    const data = ALL_DATA[fname];
    const base = fname.replace('.wav', '');
    const icon = EMOTION_ICONS[fname] || '';
    const rows = data.syllables;
    const intv = data.syllable_intervals;
    const avgLoud = rows.reduce((s, r) => s + r.loudness, 0) / rows.length;
    const avgEmph = rows.reduce((s, r) => s + r.emphasis, 0) / rows.length;
    const avgPause = rows.reduce((s, r) => s + r.pause_ms, 0) / rows.length;
    const maxEmph = Math.max(...rows.map(r => r.emphasis));

    let tableRows = rows.map((r, i) =>
      '<tr><td class="syllable-cell">' + r.syllable + '</td>'
      + '<td class="num">' + fmt(r.loudness, 4) + '</td>'
      + '<td class="num">' + fmt(r.raw_db, 1) + ' dB</td>'
      + '<td class="num">' + fmt(r.emphasis, 4) + '</td>'
      + '<td class="num">' + fmt(r.pause_ms, 0) + 'ms</td>'
      + '<td class="num">' + fmt(intv[i].start, 3) + 's \u2013 ' + fmt(intv[i].end, 3) + 's</td></tr>'
    ).join('');

    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML =
      '<div class="card-header">'
      + '<h2><span class="emoji-badge">' + icon + '</span> ' + base + '</h2>'
      + '<div class="audio-wrapper"><audio controls preload="none" src="audio_files/' + fname + '"></audio></div>'
      + '</div>'
      + '<div class="chart-wrap"><canvas height="240" style="height:240px"></canvas></div>'
      + '<div class="summary-row">'
      + '<div class="stat">Avg Loudness: <span class="value">' + fmt(avgLoud, 4) + '</span></div>'
      + '<div class="stat">Avg Emphasis: <span class="value">' + fmt(avgEmph, 4) + '</span></div>'
      + '<div class="stat">Avg Pause: <span class="value">' + fmt(avgPause, 0) + 'ms</span></div>'
      + '<div class="stat">Max Emphasis: <span class="value">' + fmt(maxEmph, 4) + '</span></div>'
      + '<div class="stat">Baseline F\u2080: <span class="value">' + fmt(data.baseline_f0, 0) + ' Hz</span></div>'
      + '<div class="stat">Global range: <span class="value">' + fmt(lo, 1) + ' dB \u2013 ' + fmt(hi, 1) + ' dB</span></div>'
      + '</div>'
      + '<div class="card-body"><table><thead><tr>'
      + '<th>Syllable</th><th>Loudness</th><th>Raw dB</th><th>Emphasis</th><th>Pause</th><th>Interval</th>'
      + '</tr></thead><tbody>' + tableRows + '</tbody></table></div></div>';
    container.appendChild(card);
    setupCard(card, data);
  }
})();
</script>
