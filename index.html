<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>local_device · sample viewer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg0: #0b0f14;
      --bg1: #121820;
      --ink: #e8edf2;
      --muted: #8b98a8;
      --panel: rgba(18, 24, 32, 0.92);
      --panel-edge: rgba(232, 237, 242, 0.08);
      --chart-bg: #0f141c;
      --grid: rgba(232, 237, 242, 0.06);
      --axis: rgba(232, 237, 242, 0.28);
      --loudness: #4fd1a5;
      --elongation: #f0a060;
      --pitch: #7aa2ff;
      --playhead: #ff6b5a;
      --emotion-bg: #243044;
      --emotion-fg: #dce6f2;
      --transcript-bg: rgba(8, 12, 18, 0.65);
      --word-active: #ffe08a;
      --phoneme-rail-bg: #0a0e14;
      --shadow: 0 22px 60px rgba(0, 0, 0, 0.45);
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      color: var(--ink);
      font-family: "Sora", sans-serif;
      background:
        radial-gradient(1100px 650px at 10% -8%, rgba(122, 162, 255, 0.12), transparent 55%),
        radial-gradient(900px 520px at 100% 0%, rgba(79, 209, 165, 0.08), transparent 50%),
        radial-gradient(700px 480px at 50% 100%, rgba(240, 160, 96, 0.06), transparent 45%),
        linear-gradient(165deg, var(--bg0), var(--bg1));
      background-attachment: fixed;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.18;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.45'/%3E%3C/svg%3E");
      mix-blend-mode: soft-light;
    }

    .page {
      position: relative;
      width: min(1120px, calc(100% - 2rem));
      margin: 0 auto;
      padding: 2.4rem 0 4rem;
    }

    header.hero {
      display: grid;
      gap: 0.75rem;
      margin-bottom: 2rem;
      animation: rise 0.7s ease both;
    }

    .brand {
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 1;
    }

    .lede {
      max-width: 42rem;
      margin: 0;
      color: var(--muted);
      font-size: 1.02rem;
      line-height: 1.55;
    }

    .meta-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
      align-items: center;
      margin-top: 0.4rem;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.35rem 0.7rem;
      border: 1px solid var(--panel-edge);
      border-radius: 999px;
      background: rgba(15, 20, 28, 0.8);
      color: var(--muted);
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.78rem;
    }

    .status {
      color: var(--muted);
      font-size: 0.95rem;
      margin: 0 0 1.2rem;
    }

    .status.error { color: #ff8a8a; }

    #gallery {
      display: grid;
      gap: 1.4rem;
    }

    .sample {
      background: var(--panel);
      border: 1px solid var(--panel-edge);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      overflow: hidden;
      animation: rise 0.65s ease both;
    }

    .sample-head {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 0.8rem;
      padding: 1.1rem 1.25rem 0.75rem;
      border-bottom: 1px solid var(--panel-edge);
    }

    .sample-title {
      display: grid;
      gap: 0.25rem;
      min-width: 0;
    }

    .sample-id {
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.95rem;
      font-weight: 500;
      letter-spacing: -0.02em;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .emotion {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      padding: 0.28rem 0.7rem;
      border-radius: 999px;
      background: var(--emotion-bg);
      color: var(--emotion-fg);
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .transcript-wrap {
      padding: 0.65rem 1.25rem 0.85rem;
      border-bottom: 1px solid var(--panel-edge);
      background: var(--transcript-bg);
    }

    .transcript-label {
      display: block;
      margin-bottom: 0.35rem;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .transcript {
      margin: 0;
      overflow-x: auto;
      overflow-y: hidden;
      white-space: nowrap;
      font-size: 0.98rem;
      line-height: 1.5;
      color: var(--ink);
      scrollbar-width: thin;
      scrollbar-color: rgba(232, 237, 242, 0.2) transparent;
    }

    .transcript .word {
      display: inline;
      padding: 0.08rem 0.18rem;
      border-radius: 4px;
      transition: color 0.12s ease, background 0.12s ease;
    }

    .transcript .word.active {
      color: #1a1408;
      background: var(--word-active);
      font-weight: 600;
    }

    .phoneme-section {
      padding: 0.75rem 1.1rem 0.25rem;
    }

    .phoneme-section-label {
      margin: 0 0 0.35rem 0.15rem;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .phoneme-rail-wrap {
      border-radius: 10px;
      background: var(--phoneme-rail-bg);
      border: 1px solid var(--panel-edge);
      overflow: hidden;
    }

    canvas.phoneme-rail {
      display: block;
      width: 100%;
      height: 34px;
    }

    .players {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0.75rem;
      padding: 1rem 1.25rem 0.4rem;
    }

    .player {
      display: grid;
      gap: 0.35rem;
      min-width: 0;
    }

    .player label {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
    }

    audio {
      width: 100%;
      height: 36px;
      filter: invert(0.88) hue-rotate(180deg);
    }

    .charts {
      display: grid;
      gap: 0.85rem;
      padding: 0.7rem 1.1rem 1.2rem;
    }

    .chart-block {
      display: grid;
      gap: 0.35rem;
    }

    .chart-label {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 0.75rem;
      padding: 0 0.15rem;
    }

    .chart-label strong {
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    .chart-label span {
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.72rem;
      color: var(--muted);
    }

    .chart-wrap {
      position: relative;
      border-radius: 12px;
      background: var(--chart-bg);
      border: 1px solid var(--panel-edge);
      overflow: hidden;
    }

    canvas.chart {
      display: block;
      width: 100%;
      height: 168px;
      cursor: crosshair;
    }

    .tooltip {
      position: absolute;
      z-index: 2;
      pointer-events: none;
      transform: translate(-50%, calc(-100% - 10px));
      padding: 0.35rem 0.55rem;
      border-radius: 8px;
      background: #1b2430;
      border: 1px solid var(--panel-edge);
      color: var(--ink);
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.7rem;
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.12s ease;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
    }

    .tooltip.visible { opacity: 1; }

    @keyframes rise {
      from { opacity: 0; transform: translateY(14px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 720px) {
      .players { grid-template-columns: 1fr; }
      canvas.chart { height: 152px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="hero">
      <div class="brand">local_device</div>
      <p class="lede">
        Per-sample phoneme step plots for loudness, elongation, and pitch —
        aligned to the expressive timeline, with neutral audio alongside.
      </p>
      <div class="meta-bar">
        <span class="chip" id="sampleCount">scanning…</span>
        <span class="chip">samples.json → audio → neutral</span>
      </div>
    </header>

    <p class="status" id="status">Loading samples…</p>
    <div id="gallery"></div>
  </div>

  <script>
    const CHARTS = [
      {
        key: "loudness",
        title: "Loudness",
        unit: "dB",
        colorVar: "--loudness",
        valueKey: "loudness_db",
        hasOwnTiming: true,
      },
      {
        key: "elongation",
        title: "Elongation",
        unit: "ratio",
        colorVar: "--elongation",
        valueKey: "elongation_ratio",
        hasOwnTiming: false,
      },
      {
        key: "pitch",
        title: "Pitch",
        unit: "Hz",
        colorVar: "--pitch",
        valueKey: "pitch_hz",
        hasOwnTiming: true,
      },
    ];

    const PHONEME_PALETTE = [
      "#4fd1a5", "#7aa2ff", "#f0a060", "#c792ea", "#ff6b5a",
      "#56d4dd", "#e6c07b", "#98c379", "#d19a66", "#61afef",
    ];

    function getCss(name) {
      return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
    }

    function pad(n) {
      return Math.max(1e-9, Math.abs(n) * 0.08);
    }

    function formatTime(sec) {
      if (!Number.isFinite(sec)) return "—";
      if (sec < 1) return `${Math.round(sec * 1000)} ms`;
      return `${sec.toFixed(2)} s`;
    }

    function formatValue(v, unit) {
      if (v == null || !Number.isFinite(v)) return "—";
      const abs = Math.abs(v);
      const digits = abs >= 100 ? 1 : abs >= 10 ? 2 : 3;
      return `${v.toFixed(digits)} ${unit}`;
    }

    function formatAxis(v) {
      const abs = Math.abs(v);
      if (abs >= 100) return v.toFixed(0);
      if (abs >= 10) return v.toFixed(1);
      return v.toFixed(2);
    }

    function phoneColor(index) {
      return PHONEME_PALETTE[index % PHONEME_PALETTE.length];
    }

    function buildPhonemeTimeline(feature) {
      const phones =
        (feature.loudness && feature.loudness.phones) ||
        (feature.pitch && feature.pitch.phones) ||
        [];
      return phones
        .filter((p) => p.start != null && p.end != null && p.end > p.start)
        .map((p) => ({
          phone: p.phone || "?",
          phone_index: p.phone_index ?? 0,
          start: p.start,
          end: p.end,
        }));
    }

    function buildSegments(feature, chart, phonemeTimeline) {
      const block = feature[chart.key];
      if (!block || !Array.isArray(block.phones)) return [];

      const timingByIndex = new Map();
      for (const phone of phonemeTimeline) {
        timingByIndex.set(phone.phone_index, phone);
      }

      const segments = [];
      for (const phone of block.phones) {
        const value = phone[chart.valueKey];
        if (value == null || !Number.isFinite(value)) continue;

        let start = phone.start;
        let end = phone.end;
        if (start == null || end == null) {
          const timed = timingByIndex.get(phone.phone_index);
          if (!timed) continue;
          start = timed.start;
          end = timed.end;
        }
        if (!(end > start)) continue;

        segments.push({
          phone: phone.phone || "?",
          phone_index: phone.phone_index ?? 0,
          start,
          end,
          value,
        });
      }
      return segments;
    }

    function extent(segments) {
      if (!segments.length) return { minV: 0, maxV: 1, maxT: 1 };
      let minV = Infinity;
      let maxV = -Infinity;
      let maxT = 0;
      for (const s of segments) {
        minV = Math.min(minV, s.value);
        maxV = Math.max(maxV, s.value);
        maxT = Math.max(maxT, s.end);
      }
      if (minV === maxV) {
        const bump = Math.abs(minV) * 0.05 || 1;
        minV -= bump;
        maxV += bump;
      }
      return { minV, maxV, maxT: Math.max(maxT, 1e-3) };
    }

    class TimelineCanvas {
      constructor(canvas, { left = 48, right = 14, top = 4, bottom = 4 } = {}) {
        this.canvas = canvas;
        this.ctx = canvas.getContext("2d");
        this.layout = { left, right, top, bottom };
        this.phones = [];
        this.maxT = 1;
        this.playhead = null;
        this.activePhoneIndex = null;
        window.addEventListener("resize", () => this.resize());
      }

      setData(phones, maxT) {
        this.phones = phones;
        this.maxT = Math.max(maxT, 1e-3);
        this.resize();
      }

      setPlayhead(t) {
        this.playhead = t;
        this.activePhoneIndex = null;
        if (Number.isFinite(t)) {
          const hit = this.phones.find((p) => t >= p.start && t <= p.end);
          if (hit) this.activePhoneIndex = hit.phone_index;
        }
        this.draw();
      }

      resize() {
        const rect = this.canvas.getBoundingClientRect();
        const dpr = Math.max(1, window.devicePixelRatio || 1);
        this.canvas.width = Math.round(rect.width * dpr);
        this.canvas.height = Math.round(rect.height * dpr);
        this.ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        this.width = rect.width;
        this.height = rect.height;
        this.draw();
      }

      plotRect() {
        const { left, right, top, bottom } = this.layout;
        return {
          x: left,
          y: top,
          w: Math.max(10, this.width - left - right),
          h: Math.max(8, this.height - top - bottom),
        };
      }

      xOf(t) {
        const p = this.plotRect();
        return p.x + (t / this.maxT) * p.w;
      }

      draw() {
        const ctx = this.ctx;
        const { width, height } = this;
        if (!width || !height) return;
        ctx.clearRect(0, 0, width, height);
        const p = this.plotRect();

        for (const phone of this.phones) {
          const x0 = this.xOf(phone.start);
          const x1 = this.xOf(phone.end);
          const w = Math.max(1, x1 - x0);
          const color = phoneColor(phone.phone_index);
          const active = phone.phone_index === this.activePhoneIndex;

          ctx.fillStyle = active
            ? color + "55"
            : color + "28";
          ctx.fillRect(x0, p.y, w, p.h);

          ctx.strokeStyle = active ? color : color + "aa";
          ctx.lineWidth = active ? 1.5 : 1;
          ctx.strokeRect(x0 + 0.5, p.y + 0.5, w - 1, p.h - 1);

          const label = phone.phone.replace(/[0-9]/g, "");
          const short = phone.phone.length <= 4 ? phone.phone : label;
          if (w >= 18) {
            ctx.fillStyle = active ? "#fff" : color;
            ctx.font = `500 ${w >= 34 ? 10 : 9}px "IBM Plex Mono", monospace`;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(short, x0 + w / 2, p.y + p.h / 2);
          }
        }

        if (this.playhead != null && Number.isFinite(this.playhead)) {
          const x = this.xOf(Math.min(Math.max(this.playhead, 0), this.maxT));
          ctx.strokeStyle = getCss("--playhead");
          ctx.lineWidth = 1.4;
          ctx.beginPath();
          ctx.moveTo(x, p.y);
          ctx.lineTo(x, p.y + p.h);
          ctx.stroke();
        }
      }
    }

    class StepChart {
      constructor(canvas, tooltip, color, unit) {
        this.canvas = canvas;
        this.tooltip = tooltip;
        this.color = color;
        this.unit = unit;
        this.ctx = canvas.getContext("2d");
        this.segments = [];
        this.phones = [];
        this.minV = 0;
        this.maxV = 1;
        this.maxT = 1;
        this.playhead = null;
        this.activePhoneIndex = null;
        this.layout = { left: 48, right: 14, top: 18, bottom: 28 };

        canvas.addEventListener("pointermove", (e) => this.onMove(e));
        canvas.addEventListener("pointerleave", () => this.hideTip());
        window.addEventListener("resize", () => this.resize());
      }

      setData(segments, phones, maxTOverride) {
        this.segments = segments;
        this.phones = phones;
        const ext = extent(segments);
        this.minV = ext.minV;
        this.maxV = ext.maxV;
        this.maxT = Math.max(ext.maxT, maxTOverride || 0);
        this.resize();
      }

      setPlayhead(t) {
        this.playhead = t;
        this.activePhoneIndex = null;
        if (Number.isFinite(t)) {
          const hit = this.phones.find((p) => t >= p.start && t <= p.end);
          if (hit) this.activePhoneIndex = hit.phone_index;
        }
        this.draw();
      }

      resize() {
        const rect = this.canvas.getBoundingClientRect();
        const dpr = Math.max(1, window.devicePixelRatio || 1);
        this.canvas.width = Math.round(rect.width * dpr);
        this.canvas.height = Math.round(rect.height * dpr);
        this.ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        this.width = rect.width;
        this.height = rect.height;
        this.draw();
      }

      plotRect() {
        const { left, right, top, bottom } = this.layout;
        return {
          x: left,
          y: top,
          w: Math.max(10, this.width - left - right),
          h: Math.max(10, this.height - top - bottom),
        };
      }

      xOf(t) {
        const p = this.plotRect();
        return p.x + (t / this.maxT) * p.w;
      }

      yOf(v) {
        const p = this.plotRect();
        const span = this.maxV - this.minV || 1;
        const padY = pad(span);
        const lo = this.minV - padY;
        const hi = this.maxV + padY;
        return p.y + ((hi - v) / (hi - lo)) * p.h;
      }

      draw() {
        const ctx = this.ctx;
        const { width, height } = this;
        if (!width || !height) return;

        ctx.clearRect(0, 0, width, height);
        const p = this.plotRect();

        // phoneme background bands
        for (const phone of this.phones) {
          const x0 = this.xOf(phone.start);
          const x1 = this.xOf(phone.end);
          const w = Math.max(1, x1 - x0);
          const color = phoneColor(phone.phone_index);
          const active = phone.phone_index === this.activePhoneIndex;
          ctx.fillStyle = active ? color + "22" : color + "10";
          ctx.fillRect(x0, p.y, w, p.h);
        }

        // grid
        ctx.strokeStyle = getCss("--grid");
        ctx.lineWidth = 1;
        for (let i = 0; i <= 4; i++) {
          const y = p.y + (p.h * i) / 4;
          ctx.beginPath();
          ctx.moveTo(p.x, y);
          ctx.lineTo(p.x + p.w, y);
          ctx.stroke();
        }

        // axes
        ctx.strokeStyle = getCss("--axis");
        ctx.beginPath();
        ctx.moveTo(p.x, p.y);
        ctx.lineTo(p.x, p.y + p.h);
        ctx.lineTo(p.x + p.w, p.y + p.h);
        ctx.stroke();

        // y ticks: max → min
        ctx.fillStyle = getCss("--muted");
        ctx.font = '11px "IBM Plex Mono", monospace';
        ctx.textAlign = "right";
        ctx.textBaseline = "middle";
        for (const v of [this.maxV, (this.maxV + this.minV) / 2, this.minV]) {
          ctx.fillText(formatAxis(v), p.x - 8, this.yOf(v));
        }

        // x ticks
        ctx.textAlign = "center";
        ctx.textBaseline = "top";
        const xCount = Math.min(6, Math.max(3, Math.floor(p.w / 90)));
        for (let i = 0; i <= xCount; i++) {
          const t = (this.maxT * i) / xCount;
          ctx.fillText(formatTime(t), this.xOf(t), p.y + p.h + 8);
        }

        // step segments with phoneme labels
        for (const seg of this.segments) {
          const y = this.yOf(seg.value);
          const x0 = this.xOf(seg.start);
          const x1 = this.xOf(seg.end);
          const w = Math.max(1, x1 - x0);
          const segColor = phoneColor(seg.phone_index);
          const active = seg.phone_index === this.activePhoneIndex;

          ctx.strokeStyle = active ? segColor : this.color;
          ctx.lineWidth = active ? 3 : 2.4;
          ctx.lineCap = "round";
          ctx.beginPath();
          ctx.moveTo(x0, y);
          ctx.lineTo(x1, y);
          ctx.stroke();

          ctx.fillStyle = active ? segColor : this.color;
          ctx.beginPath();
          ctx.arc(x0, y, active ? 3 : 2.2, 0, Math.PI * 2);
          ctx.arc(x1, y, active ? 3 : 2.2, 0, Math.PI * 2);
          ctx.fill();

          // phoneme tag above the line
          if (w >= 16) {
            const labelY = Math.max(p.y + 8, y - 10);
            const fontSize = w >= 42 ? 10 : 9;
            ctx.font = `600 ${fontSize}px "IBM Plex Mono", monospace`;
            ctx.textAlign = "center";
            ctx.textBaseline = "bottom";
            ctx.fillStyle = active ? segColor : getCss("--muted");
            const tag = w >= 28 ? seg.phone : seg.phone.replace(/[0-9]/g, "");
            ctx.fillText(tag, x0 + w / 2, labelY);
          }

          // connector from tag area to line
          if (w >= 16 && active) {
            ctx.strokeStyle = segColor + "88";
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(x0 + w / 2, Math.max(p.y + 8, y - 10));
            ctx.lineTo(x0 + w / 2, y);
            ctx.stroke();
          }
        }

        // playhead
        if (this.playhead != null && Number.isFinite(this.playhead)) {
          const x = this.xOf(Math.min(Math.max(this.playhead, 0), this.maxT));
          ctx.strokeStyle = getCss("--playhead");
          ctx.lineWidth = 1.6;
          ctx.beginPath();
          ctx.moveTo(x, p.y);
          ctx.lineTo(x, p.y + p.h);
          ctx.stroke();

          ctx.fillStyle = getCss("--playhead");
          ctx.beginPath();
          ctx.moveTo(x, p.y);
          ctx.lineTo(x - 5, p.y - 7);
          ctx.lineTo(x + 5, p.y - 7);
          ctx.closePath();
          ctx.fill();
        }
      }

      onMove(e) {
        const rect = this.canvas.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const p = this.plotRect();
        if (x < p.x || x > p.x + p.w) {
          this.hideTip();
          return;
        }
        const t = ((x - p.x) / p.w) * this.maxT;
        const hit = this.segments.find((s) => t >= s.start && t <= s.end);
        if (!hit) {
          this.hideTip();
          return;
        }
        this.tooltip.textContent = `${hit.phone} · ${formatValue(hit.value, this.unit)} · ${formatTime(hit.start)}–${formatTime(hit.end)}`;
        this.tooltip.style.left = `${x}px`;
        this.tooltip.style.top = `${this.yOf(hit.value)}px`;
        this.tooltip.classList.add("visible");
      }

      hideTip() {
        this.tooltip.classList.remove("visible");
      }
    }

    function buildTranscriptHtml(transcript, words) {
      if (Array.isArray(words) && words.length) {
        return words
          .map((w) => {
            const text = w.text_norm || w.text_raw || "";
            return `<span class="word" data-start="${w.start}" data-end="${w.end}">${escapeHtml(text)}</span>`;
          })
          .join(" ");
      }
      if (transcript) {
        return `<span class="word">${escapeHtml(transcript)}</span>`;
      }
      return `<span class="word" style="color:var(--muted)">No transcript available</span>`;
    }

    async function loadSamples() {
      const status = document.getElementById("status");
      const gallery = document.getElementById("gallery");
      const countChip = document.getElementById("sampleCount");

      let list;
      try {
        const res = await fetch("samples.json");
        if (!res.ok) throw new Error(`samples.json ${res.status}`);
        list = await res.json();
      } catch (err) {
        status.className = "status error";
        status.textContent =
          "Could not load samples.json. Run: python generate_samples.py";
        countChip.textContent = "0 samples";
        return;
      }

      if (!list.length) {
        status.textContent = "samples.json is empty. Run: python generate_samples.py";
        countChip.textContent = "0 samples";
        return;
      }

      status.textContent = "";
      countChip.textContent = `${list.length} sample${list.length === 1 ? "" : "s"}`;

      for (const [index, meta] of list.entries()) {
        const feature = meta.feature ?? null;
        const mfa = meta.mfa ?? null;
        const error = feature ? null : "missing feature data in samples.json";
        gallery.appendChild(renderSample({ meta, feature, mfa, index, error }));
      }
    }

    function renderSample({ meta, feature, mfa, index, error }) {
      const el = document.createElement("article");
      el.className = "sample";
      el.style.animationDelay = `${Math.min(index, 8) * 0.05}s`;

      const style = (feature && feature.style) || meta.style || "unknown";
      const id = meta.id || (feature && feature.filename) || "sample";
      const words = mfa && Array.isArray(mfa.words) ? mfa.words : [];
      const transcriptHtml = buildTranscriptHtml(meta.transcript, words);

      el.innerHTML = `
        <div class="sample-head">
          <div class="sample-title">
            <div class="sample-id" title="${escapeHtml(id)}">${escapeHtml(id)}</div>
            <span class="emotion">${escapeHtml(style)}</span>
          </div>
        </div>
        <div class="transcript-wrap">
          <span class="transcript-label">Transcript</span>
          <p class="transcript">${transcriptHtml}</p>
        </div>
        <div class="phoneme-section">
          <p class="phoneme-section-label">Phoneme timeline</p>
          <div class="phoneme-rail-wrap">
            <canvas class="phoneme-rail" aria-label="Phoneme timeline"></canvas>
          </div>
        </div>
        <div class="players">
          <div class="player">
            <label>Expressive</label>
            <audio controls preload="metadata" data-role="expressive"></audio>
          </div>
          <div class="player">
            <label>Neutral</label>
            <audio controls preload="metadata" data-role="neutral"></audio>
          </div>
        </div>
        <div class="charts"></div>
      `;

      const expressive = el.querySelector('audio[data-role="expressive"]');
      const neutral = el.querySelector('audio[data-role="neutral"]');
      const transcriptEl = el.querySelector(".transcript");
      const wordEls = [...transcriptEl.querySelectorAll(".word[data-start]")];
      const phonemeCanvas = el.querySelector("canvas.phoneme-rail");

      if (meta.audio_url) expressive.src = meta.audio_url;
      if (meta.neutral_url) neutral.src = meta.neutral_url;

      const chartsRoot = el.querySelector(".charts");

      if (error || !feature) {
        chartsRoot.innerHTML = `<p class="status error">Failed to load features for ${escapeHtml(id)}.</p>`;
        return el;
      }

      const phonemeTimeline = buildPhonemeTimeline(feature);
      const phonemeRail = new TimelineCanvas(phonemeCanvas);

      const chartInstances = [];
      let sharedMaxT = 0;
      for (const p of phonemeTimeline) sharedMaxT = Math.max(sharedMaxT, p.end);

      for (const spec of CHARTS) {
        const color = getCss(spec.colorVar);
        const segments = buildSegments(feature, { ...spec, color }, phonemeTimeline);
        for (const s of segments) sharedMaxT = Math.max(sharedMaxT, s.end);

        const block = document.createElement("div");
        block.className = "chart-block";
        const vals = segments.map((s) => s.value);
        const minV = vals.length ? Math.min(...vals) : 0;
        const maxV = vals.length ? Math.max(...vals) : 1;
        block.innerHTML = `
          <div class="chart-label">
            <strong style="color:${color}">${spec.title}</strong>
            <span>y ${formatValue(maxV, spec.unit)} → ${formatValue(minV, spec.unit)}</span>
          </div>
          <div class="chart-wrap">
            <div class="tooltip"></div>
            <canvas class="chart" aria-label="${spec.title} step plot"></canvas>
          </div>
        `;
        chartsRoot.appendChild(block);

        const canvas = block.querySelector("canvas");
        const tip = block.querySelector(".tooltip");
        const chart = new StepChart(canvas, tip, color, spec.unit);
        chartInstances.push({ chart, segments });
      }

      const applyDuration = () => {
        const dur = Number.isFinite(expressive.duration) ? expressive.duration : 0;
        const maxT = Math.max(sharedMaxT, dur, 1e-3);
        phonemeRail.setData(phonemeTimeline, maxT);
        for (const { chart, segments } of chartInstances) {
          chart.setData(segments, phonemeTimeline, maxT);
        }
      };
      expressive.addEventListener("loadedmetadata", applyDuration);
      applyDuration();

      const updatePlayhead = (t) => {
        phonemeRail.setPlayhead(t);
        for (const { chart } of chartInstances) chart.setPlayhead(t);
        for (const w of wordEls) {
          const start = parseFloat(w.dataset.start);
          const end = parseFloat(w.dataset.end);
          w.classList.toggle("active", t >= start && t <= end);
        }
      };

      let raf = 0;
      const stopRaf = () => {
        if (raf) cancelAnimationFrame(raf);
        raf = 0;
      };
      const tick = () => {
        updatePlayhead(expressive.currentTime);
        if (!expressive.paused && !expressive.ended) {
          raf = requestAnimationFrame(tick);
        } else {
          raf = 0;
        }
      };

      expressive.addEventListener("play", () => {
        if (!neutral.paused) neutral.pause();
        stopRaf();
        raf = requestAnimationFrame(tick);
      });
      expressive.addEventListener("pause", stopRaf);
      expressive.addEventListener("ended", () => {
        stopRaf();
        updatePlayhead(expressive.duration || sharedMaxT);
      });
      expressive.addEventListener("seeked", () => updatePlayhead(expressive.currentTime));

      neutral.addEventListener("play", () => {
        if (!expressive.paused) expressive.pause();
      });

      return el;
    }

    function escapeHtml(s) {
      return String(s)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    loadSamples();
  </script>
</body>
</html>
